base_path: "/tileserver"
pmtiles:
  sources:
    areamap-mlt:
      path: ../../data/Bogota/Bogota.pmtiles
      # Convert MVT <-> MLT when client requests it
      # Currently the archive stores .mvt tiles, but this might change.
      convert_to_mlt:
        allow_shared_dict: false
    areamap-mvt:
      path: ../../data/Bogota/Bogota.pmtiles
      # Convert MVT <-> MLT when client requests it.
      # Currently the archive stores .mvt tiles, but this might change.
      convert_to_mvt: auto
mbtiles:
  sources:
    landcover: ../../data/Bogota/landcover.mbtiles
    terrain: ../../data/Bogota/terrain.mbtiles
styles:
  paths: ['./assets/styles']
sprites:
  paths: ['./assets/sprites']
fonts:
  paths: ['./assets/fonts']
